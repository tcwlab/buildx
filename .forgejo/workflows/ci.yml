# ─────────────────────────────────────────────────────────────────────────────
# chameleon-ci / buildx — Build & Publish
#
# Bootstrap-Image: kann sich nicht selbst als CI-Container verwenden
# (Chicken-and-egg). Deshalb: Host-Runner + DinD als Service +
# Docker CLI inline installiert. Einzige Ausnahme vom
# "kein Inline-Install"-Prinzip — gilt nur für dieses Meta-Image selbst.
#
# Versionierung: Tag = <tool-version>-<sha8>  (z.B. v2.12.0-f83dc49e)
#   → tcwlab/buildx:<version>-<sha8>  immutable
#   → tcwlab/buildx:<version>          float
#   → tcwlab/buildx:latest             float
# ─────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main, "claude/*"]
    tags: ["v*.*.*-*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: tcwlab/buildx
  DOCKER_CLI_URL: https://download.docker.com/linux/static/stable/x86_64/docker-27.3.1.tgz

jobs:

  # ---------------------------------------------------------------------------
  build-test:
    name: Build & Smoke-Test (amd64)
    runs-on: ubuntu-22.04
    env:
      DOCKER_HOST: tcp://docker-in-docker:2375
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4

      - name: Install Docker CLI
        run: |
          curl -fsSL "${{ env.DOCKER_CLI_URL }}" -o /tmp/docker.tgz
          tar xzf /tmp/docker.tgz --strip-components=1 -C /usr/local/bin docker/docker
          docker version

      - name: Build (amd64)
        run: docker build -t "${{ env.IMAGE }}:test" .

      - name: Smoke-Test
        run: |
          docker run --rm "${{ env.IMAGE }}:test" docker buildx version
          docker run --rm "${{ env.IMAGE }}:test" git --version

      - name: Auto-Tag Release
        if: github.ref == 'refs/heads/main'
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          TOOL_VER=$(grep '^FROM docker/buildx-bin:' Dockerfile | awk '{print $2}' | cut -d: -f2)
          SHA8="${{ github.sha }}"
          SHA8="${SHA8:0:8}"
          TAG="v${TOOL_VER}-${SHA8}"
          PAYLOAD=$(printf '{"tag_name":"%s","target":"%s"}' "${TAG}" "${{ github.sha }}")
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "https://git.mon.k8b.co/api/v1/repos/${{ GITHUB_REPOSITORY }}/tags")
          echo "Created tag ${TAG} -> HTTP ${HTTP}"

  # ---------------------------------------------------------------------------
  publish:
    name: Publish to Docker Hub (linux/amd64 + linux/arm64)
    runs-on: ubuntu-22.04
    needs: [build-test]
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      DOCKER_HOST: tcp://docker-in-docker:2375
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4

      - name: Extract versions from tag
        id: version
        run: |
          # Tag format: v<tool-version>-<sha8>, e.g. v2.12.0-f83dc49e
          TAG="${GITHUB_REF#refs/tags/v}"
          TOOL_VER="${TAG%-*}"
          SHA="${TAG##*-}"
          echo "tool_version=${TOOL_VER}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Install Docker CLI + buildx
        run: |
          curl -fsSL "${{ env.DOCKER_CLI_URL }}" -o /tmp/docker.tgz
          tar xzf /tmp/docker.tgz --strip-components=1 -C /usr/local/bin docker/docker
          mkdir -p ~/.docker/cli-plugins
          curl -fsSL https://github.com/docker/buildx/releases/download/v0.19.3/buildx-v0.19.3.linux-amd64 \
            -o ~/.docker/cli-plugins/docker-buildx
          chmod +x ~/.docker/cli-plugins/docker-buildx
          docker buildx version

      - name: Set up QEMU (arm64 emulation)
        run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Set up Buildx builder
        run: |
          docker buildx create --name multiarch --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Docker Hub Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
            | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build & Push (multi-arch)
        run: |
          VER="${{ steps.version.outputs.tool_version }}"
          SHA="${{ steps.version.outputs.sha }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t "${{ env.IMAGE }}:${VER}-${SHA}" \
            -t "${{ env.IMAGE }}:${VER}" \
            -t "${{ env.IMAGE }}:latest" \
            --push \
            .

# ─────────────────────────────────────────────────────────────────────────────
# chameleon-ci / buildx — Build & Publish
#
# Bootstrap-Image: tcwlab/buildx kann sich nicht selbst als CI-Container
# verwenden (Chicken-and-egg). Deshalb: Host-Runner + DinD als Service +
# Docker CLI + buildx inline installiert. Einzige Ausnahme vom
# "kein Inline-Install"-Prinzip — gilt nur für dieses Meta-Image selbst.
#
# Versionierung: Tag = buildx-Version (z.B. v0.19.3)
#   → tcwlab/buildx:0.19.3 + tcwlab/buildx:latest
# ─────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main, "claude/*"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: tcwlab/buildx
  DOCKER_CLI_URL: https://download.docker.com/linux/static/stable/x86_64/docker-27.3.1.tgz

jobs:

  # ---------------------------------------------------------------------------
  build-test:
    name: Build & Smoke-Test (amd64)
    runs-on: ubuntu-22.04
    env:
      DOCKER_HOST: tcp://docker-in-docker:2375
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4

      - name: Install Docker CLI
        run: |
          curl -fsSL "${{ env.DOCKER_CLI_URL }}" -o /tmp/docker.tgz
          tar xzf /tmp/docker.tgz --strip-components=1 -C /usr/local/bin docker/docker
          docker version

      - name: Build (amd64)
        run: docker build -t "${{ env.IMAGE }}:test" .

      - name: Smoke-Test
        run: |
          docker run --rm "${{ env.IMAGE }}:test" docker buildx version
          docker run --rm "${{ env.IMAGE }}:test" git --version

  # ---------------------------------------------------------------------------
  publish:
    name: Publish to Docker Hub (linux/amd64 + linux/arm64)
    runs-on: ubuntu-22.04
    needs: [build-test]
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      DOCKER_HOST: tcp://docker-in-docker:2375
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Install Docker CLI + buildx
        run: |
          curl -fsSL "${{ env.DOCKER_CLI_URL }}" -o /tmp/docker.tgz
          tar xzf /tmp/docker.tgz --strip-components=1 -C /usr/local/bin docker/docker
          mkdir -p ~/.docker/cli-plugins
          curl -fsSL https://github.com/docker/buildx/releases/download/v0.19.3/buildx-v0.19.3.linux-amd64 \
            -o ~/.docker/cli-plugins/docker-buildx
          chmod +x ~/.docker/cli-plugins/docker-buildx
          docker buildx version

      - name: Set up QEMU (arm64 emulation)
        run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Set up Buildx builder
        run: |
          docker buildx create --name multiarch --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Docker Hub Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
            | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build & Push (multi-arch)
        run: |
          VER="${{ steps.version.outputs.version }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t "${{ env.IMAGE }}:latest" \
            -t "${{ env.IMAGE }}:${VER}" \
            --push \
            .
